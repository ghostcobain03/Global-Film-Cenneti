<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Film Cenneti</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">
        <div class="navbar-wrapper">
            <div class="logo-wrapper">
                <h1 class="logo">GlobalFilmCenneti</h1>
            </div>
            <div class="menu-container">
                <ul class="menu-list">
                    <li class="menu-list-item active" data-target="home">Ana Sayfa</li>
<li class="menu-list-item" data-target="movies">Filmler</li>
                    
                    <li class="menu-list-item">Popüler</li>
                    <li class="menu-list-item">Listem</li>
                </ul>
            </div>
            <div class="profile-container">
                
                <div class="profile-text-container">
                    <span class="profile-text">Hesabım</span>
                    <i class="bi bi-caret-down-fill"></i>
                </div>
                
            </div>
        </div>
    </div>
    <div class="sidebar">

    <div class="sidebar-top">
       
    </div>

    <div class="sidebar-menu">
        
        
    </div>

</div>

<div>
    <div class="container">
        <div class="top-search-bar">

    <i class="bi bi-search"></i>

    <input
        type="text"
        id="searchInput"
        placeholder="Film ara..."
    >

</div>
        <div class="content-wrapper">
    <div class="featured-content" id="featuredContent">

        

        <h1 class="featured-title" id="featuredTitle"></h1>

        <p class="featured-desc" id="featuredDesc"></p>

        <div class="featured-buttons">

            <button class="play-button" id="featuredPlay">
                <i class="bi bi-play-circle-fill"></i>
                Oynat
            </button>

            <button class="info-button">
                <i class="bi bi-info-circle"></i>
                Daha Fazla Bilgi
            </button>

        </div>

    </div>
</div>
        </div>
      

            <div id="movieLists"></div>
    </div>
</div>



<div class="login-modal" id="loginModal">

    <div class="login-box">

        <h2>Giriş Yap</h2>

        <input id="username" type="text" placeholder="Kullanıcı adı">
        <input id="password" type="password" placeholder="Şifre">

        <button id="loginBtn">Giriş Yap</button>

        <span id="closeLogin">Kapat</span>

    </div>

</div>


<script src="script.js"></script>
</body>
</html>
